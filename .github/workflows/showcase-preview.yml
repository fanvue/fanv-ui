# Deploy showcase preview for pull requests
name: Showcase Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build showcase
        run: pnpm build:showcase
        env:
          VITE_BASE: /fanv-ui-internal/pr-preview/pr-${{ github.event.pull_request.number }}/

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist-showcase
          umbrella-dir: pr-preview
          action: deploy
          comment: false

      - name: Comment preview URL
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: showcase-preview
          message: |
            ## Showcase Preview

            | Preview | URL |
            |---------|-----|
            | Showcase | https://fanvue.github.io/fanv-ui-internal/pr-preview/pr-${{ github.event.pull_request.number }}/ |

  cleanup-preview:
    name: Cleanup Preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist-showcase
          umbrella-dir: pr-preview
          action: remove
