# Chromatic Workflow - Visual regression testing
name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  chromatic:
    name: Visual Regression
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'chromatic')) ||
      (github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore(main): release'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Chromatic to work properly

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Run Chromatic
        id: chromatic
        uses: chromaui/action@v15
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          projectId: ${{ secrets.CHROMATIC_PROJECT_ID }}
          storybookBuildDir: storybook-static
          onlyChanged: true
          autoAcceptChanges: main
          exitZeroOnChanges: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: chromatic
          message: |
            ## 🎨 Chromatic Build

            | Preview | Status |
            |---------|--------|
            | [View Storybook](${{ steps.chromatic.outputs.storybookUrl }}) | ✅ Ready |
            | [View Chromatic Build](${{ steps.chromatic.outputs.buildUrl }}) | ${{ steps.chromatic.outputs.changeCount }} change(s) |

  chromatic-ok:
    name: Chromatic OK
    needs: [chromatic]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        env:
          RESULT: ${{ needs.chromatic.result }}
          IS_RELEASE_PR: ${{ startsWith(github.head_ref, 'release-please--') }}
        run: |
          if [[ "$RESULT" == "success" ]]; then
            echo "Chromatic passed"
            exit 0
          fi
          if [[ "$RESULT" == "skipped" && "$IS_RELEASE_PR" == "true" ]]; then
            echo "Release PR — Chromatic intentionally skipped"
            exit 0
          fi
          if [[ "$RESULT" == "skipped" ]]; then
            echo "Chromatic has not been run. Apply the 'chromatic' label to trigger visual regression tests."
            exit 1
          fi
          echo "Chromatic failed with result: $RESULT"
          exit 1
